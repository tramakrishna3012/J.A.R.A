<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.A | Identity & Auth Portal</title>
    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        night: '#05070A',
                        obsidian: '#0B0F19',
                        electric: '#6366F1',
                        neon: '#00F5FF',
                        ash: '#94A3B8',
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 3s linear infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        scan: {
                            '0%': { top: '0%' },
                            '100%': { top: '100%' },
                        },
                        glow: {
                            '0%': { opacity: 0.3, filter: 'blur(8px)' },
                            '100%': { opacity: 0.7, filter: 'blur(12px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        
        body {
            background-color: #05070A;
            color: #E2E8F0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .premium-gradient {
            background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                        radial-gradient(circle at 0% 100%, rgba(0, 245, 255, 0.05), transparent);
        }

        .auth-card {
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            content: "";
            opacity: 0.03;
            z-index: 9999;
            pointer-events: none;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        }

        .sso-button {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.03);
        }

        .sso-button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00F5FF, transparent);
            box-shadow: 0 0 15px #00F5FF;
            position: absolute;
            width: 100%;
            z-index: 20;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366F1;
            background: rgba(99, 102, 241, 0.05);
            outline: none;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .agent-id-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(0, 245, 255, 0.05) 100%);
            border: 1px dashed rgba(99, 102, 241, 0.3);
        }

        /* Custom selection */
        ::selection {
            background: #6366F1;
            color: white;
        }
    </style>
</head>
<body x-data="{ 
    step: 'login', 
    loading: false, 
    email: '', 
    verifying: false,
    initAgent() {
        this.loading = true;
        setTimeout(() => {
            this.step = 'verify';
            this.loading = false;
            this.startVerification();
        }, 1500);
    },
    startVerification() {
        this.verifying = true;
        setTimeout(() => {
            window.location.href = '#dashboard';
        }, 4000);
    }
}" class="premium-gradient">

    <div class="noise"></div>

    <!-- Simple Auth Nav -->
    <nav class="fixed top-0 w-full z-50 py-8 px-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-gradient-to-br from-electric to-neon rounded-lg flex items-center justify-center">
                    <span class="font-bold text-night text-sm">J</span>
                </div>
                <span class="text-xl font-bold tracking-tighter uppercase">J.A.R.A</span>
            </div>
            <a href="/" class="text-xs font-bold tracking-widest text-ash hover:text-white transition-colors uppercase">Back to Terminal</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 pt-24">
        
        <!-- Login Card -->
        <template x-if="step === 'login'">
            <div class="w-full max-w-[440px] auth-card rounded-3xl p-10 relative overflow-hidden" x-transition:enter="transition ease-out duration-500" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
                <div class="mb-10 text-center">
                    <h1 class="text-3xl font-bold mb-3 tracking-tight">System Access</h1>
                    <p class="text-ash text-sm">Deploy your autonomous agent by authenticating your identity.</p>
                </div>

                <!-- SSO Group -->
                <div class="space-y-3 mb-8">
                    <button @click="initAgent()" class="w-full sso-button py-3.5 px-4 rounded-xl flex items-center justify-center space-x-3 group">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span class="text-sm font-bold">Continue with Google</span>
                    </button>
                    <button @click="initAgent()" class="w-full sso-button py-3.5 px-4 rounded-xl flex items-center justify-center space-x-3 group">
                        <svg class="w-5 h-5 text-[#0077B5]" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        <span class="text-sm font-bold">Continue with LinkedIn</span>
                    </button>
                </div>

                <div class="relative flex items-center mb-8">
                    <div class="flex-grow border-t border-white/5"></div>
                    <span class="flex-shrink mx-4 text-[10px] font-bold tracking-[0.2em] text-ash uppercase">Secure Direct</span>
                    <div class="flex-grow border-t border-white/5"></div>
                </div>

                <!-- Email Form -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-ash uppercase tracking-widest mb-2 ml-1">Work Email</label>
                        <input x-model="email" type="email" placeholder="name@company.com" class="w-full input-field rounded-xl px-4 py-3 text-sm focus:ring-0">
                    </div>
                    <button @click="initAgent()" :disabled="!email" class="w-full bg-white text-night py-4 rounded-xl font-bold text-sm hover:bg-electric hover:text-white transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
                        <span x-show="!loading">Initialize Agent Deployment</span>
                        <div x-show="loading" class="w-5 h-5 border-2 border-night/20 border-t-night animate-spin rounded-full"></div>
                    </button>
                </div>

                <p class="mt-8 text-center text-xs text-ash">
                    By accessing J.A.R.A, you authorize autonomous actions on your behalf.
                </p>
            </div>
        </template>

        <!-- Verification Step -->
        <template x-if="step === 'verify'">
            <div class="w-full max-w-[500px] text-center" x-transition:enter="transition ease-out duration-700 delay-300" x-transition:enter-start="opacity-0 translateY(20px)" x-transition:enter-end="opacity-100 translateY(0)">
                
                <div class="relative inline-block mb-12">
                    <!-- Identity Frame -->
                    <div class="w-32 h-32 md:w-48 md:h-48 rounded-full border-2 border-electric/30 p-2 relative">
                        <div class="w-full h-full rounded-full border border-neon/50 overflow-hidden relative">
                            <!-- Visual Scan Effect -->
                            <div class="scanner-line animate-scan"></div>
                            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover grayscale opacity-60" alt="Identity Preview">
                        </div>
                        <!-- UI Elements surrounding portal -->
                        <div class="absolute -top-2 -right-2 w-10 h-10 bg-night border border-electric rounded-lg flex items-center justify-center animate-bounce">
                            <svg class="w-5 h-5 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                    </div>
                    <!-- Outer pulse -->
                    <div class="absolute inset-0 rounded-full bg-electric/20 animate-ping -z-10"></div>
                </div>

                <div class="space-y-6">
                    <h2 class="text-3xl font-bold italic tracking-tighter">Syncing Neural Identity...</h2>
                    
                    <div class="agent-id-box p-6 rounded-2xl max-w-sm mx-auto font-mono text-left">
                        <div class="flex justify-between text-[10px] text-electric mb-2">
                            <span>AGENT_HANDSHAKE</span>
                            <span class="animate-pulse">ONLINE</span>
                        </div>
                        <div class="space-y-1 text-xs ">
                            <div class="flex justify-between">
                                <span class="text-ash">SUBJECT:</span>
                                <span x-text="email || 'USER_ALPHA_9'"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-ash">AUTH_TYPE:</span>
                                <span>FEDERATED_SSO</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-ash">STATUS:</span>
                                <span class="text-neon">VERIFYING BIOMETRICS</span>
                            </div>
                        </div>
                    </div>

                    <div class="max-w-[200px] mx-auto h-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-electric to-neon transition-all duration-[4000ms] ease-out w-0" :class="verifying ? 'w-full' : 'w-0'"></div>
                    </div>
                    
                    <p class="text-ash text-sm animate-pulse">Establishing secure handshake with LinkedIn servers...</p>
                </div>
            </div>
        </template>

    </main>

    <!-- Footer Stats -->
    <footer class="p-8 border-t border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-[10px] font-bold tracking-[0.3em] text-ash uppercase">
            <div class="flex space-x-6 mb-4 md:mb-0">
                <div class="flex items-center space-x-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                    <span>System Nominal</span>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-electric animate-pulse"></span>
                    <span>Encrypted Tunnel Active</span>
                </div>
            </div>
            <div>
                Node: JARA-AUTH-CORE-01 // Latency: 14ms
            </div>
        </div>
    </footer>

    <script>
        // Smooth scroll reveal for UI elements
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
